<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gigling Broadcast Overlay</title>
  <link rel="stylesheet" href="/overlay.css">
</head>
<body>
  <main id="overlay" class="overlay hidden" aria-live="polite">
    <section id="race-card" class="panel race-card">
      <p class="eyebrow">Gigling Racing</p>
      <h1 data-field="headline">Race Card</h1>
      <div class="stats">
        <div>
          <span>Phase</span>
          <strong data-field="phase">Unknown</strong>
        </div>
        <div>
          <span>Entrants</span>
          <strong data-field="entrants">?</strong>
        </div>
        <div>
          <span>Pool</span>
          <strong data-field="pool">Unknown</strong>
        </div>
      </div>
    </section>

    <section id="result-card" class="panel result-card">
      <p class="eyebrow">Final Result</p>
      <h1 data-field="result-headline">Race Result</h1>
      <ol data-field="results"></ol>
    </section>

    <section id="ticker" class="ticker">
      <div data-field="ticker-text">Gigling Broadcast Deck</div>
    </section>
  </main>

  <script src="/overlay.js"></script>
</body>
</html>
